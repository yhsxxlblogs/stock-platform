# ==========================================
# Stock Platform Docker Compose 配置
# 简化版 - 适用于生产环境
# ==========================================

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: stock-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-@Syh20050608}
      MYSQL_DATABASE: stock_platform
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-@Syh20050608}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: stock-redis
    restart: unless-stopped
    networks:
      - stock-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # 后端服务
  backend:
    image: ${DOCKER_REGISTRY:-}stock-platform-backend:latest
    container_name: stock-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stock_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-@Syh20050608}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_PROFILES_ACTIVE: docker
      JAVA_OPTS: "-Xms512m -Xmx1024m"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - stock-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:9090/api/stocks/public/list > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # 前端服务
  frontend:
    image: ${DOCKER_REGISTRY:-}stock-platform-frontend:latest
    container_name: stock-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - stock-network

volumes:
  mysql_data:
  redis_data:

networks:
  stock-network:
    driver: bridge
