# Docker 环境配置文件
server:
  port: ${SERVER_PORT:9090}
  servlet:
    context-path: /api

spring:
  application:
    name: stock-platform
  
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/stock_platform?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:@Syh20050608}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 300000
      max-lifetime: 900000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
    open-in-view: false
  
  redis:
    host: ${SPRING_REDIS_HOST:stock-redis}
    port: ${SPRING_REDIS_PORT:6379}
    password: ${SPRING_REDIS_PASSWORD:}
    database: 0
    timeout: 3000ms
    lettuce:
      pool:
        max-active: 4
        max-idle: 4
        min-idle: 1
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false
      write-bigdecimal-as-plain: true
    generator:
      write-numbers-as-strings: false
  
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

# JWT配置
jwt:
  secret: ${JWT_SECRET:stockPlatformSecretKey2024!@#$%^&*()_+}
  expiration: ${JWT_EXPIRATION:86400000}
  header: Authorization
  prefix: Bearer

# 股票数据配置
stock:
  data:
    source: sina
    update-interval: 5000

# 日志配置 - 使用英文
logging:
  level:
    com.stock.platform: INFO
    org.springframework.security: INFO
    com.stock.platform.service.StockDataService: ERROR
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  charset:
    console: UTF-8

# SpringDoc OpenAPI配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# 文件上传配置
file:
  upload-dir: ${FILE_UPLOAD_DIR:/app/uploads}
  avatar-max-size: 2097152
