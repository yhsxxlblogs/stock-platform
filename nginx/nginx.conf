# ==========================================
# Stock Platform Nginx 配置
# 用于反向代理到 Docker 容器
# ==========================================

server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # WebSocket 代理 - 必须放在最前面
    location /api/ws {
        proxy_pass http://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 前端静态资源
    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        
        # 支持 Vue Router history 模式
        proxy_intercept_errors on;
        error_page 404 = /index.html;
    }

    # 禁止访问敏感文件
    location ~ ^/(
        \.user\.ini|\.htaccess|\.git|\.env|\.svn|\.project|
        LICENSE|README\.md|\.dockerignore|Dockerfile
    ) {
        return 404;
    }

    # 日志
    access_log /var/log/nginx/stock-platform.access.log;
    error_log /var/log/nginx/stock-platform.error.log;
}
