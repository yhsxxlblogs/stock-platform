# ==========================================
# 宝塔面板 Nginx 反向代理配置
# 用于宝塔面板反向代理到 Docker 容器
# ==========================================

proxy_cache_path /www/wwwroot/marketpulse.supersyh.xyz/proxy_cache_dir levels=1:2 keys_zone=marketpulse_supersyh_xyz_cache:20m inactive=1d max_size=5g;

server {
    listen 80;
    listen [::]:80;
    server_name marketpulse.supersyh.xyz;

    # SSL证书申请验证
    include /www/server/panel/vhost/nginx/well-known/marketpulse.supersyh.xyz.conf;

    # 1. WebSocket 代理（必须最先匹配）
    location /api/ws {
        proxy_pass http://127.0.0.1:9090/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
    }

    # 2. API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:9090/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 3. 前端静态资源（放在最后）
    location / {
        proxy_pass http://127.0.0.1:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 禁止访问敏感文件
    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    # SSL证书验证目录
    location /.well-known {
        allow all;
    }

    # 日志
    access_log /www/wwwlogs/marketpulse.supersyh.xyz.log;
    error_log /www/wwwlogs/marketpulse.supersyh.xyz.error.log;
}
